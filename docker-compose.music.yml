services:
  lavalink:
    image: "fredboat/lavalink:latest"
    container_name: "lavalink"
    restart: "unless-stopped"
    volumes:
      - "./lavalink/application.yml:/opt/Lavalink/application.yml"
      - "./lavalink/plugins/youtube-plugin-1.11.3.jar:/opt/Lavalink/plugins/youtube-plugin-1.11.3.jar"
      - "./lavalink/plugins/lavasrc-plugin-4.3.0.jar:/opt/Lavalink/plugins/lavasrc-plugin-4.3.0.jar"
    networks:
      - lavalink
    expose:
      - "2333"
    ports:
      - "2333:2333"

networks:
  lavalink:
    driver: bridge
