services:
  lavalink:
    image: "ghcr.io/lavalink-devs/lavalink:latest" # Use the latest version of Lavalink
    container_name: "lavalink"
    restart: "unless-stopped"
    volumes:
      - "./lavalink/application.yml:/opt/Lavalink/application.yml"
    networks:
      - lavalink
    expose:
      - "2333"
    ports:
      - "2333:2333"
    network_mode: "host" # Optional: Use host networking for better performance on Linux
networks:
  lavalink:
    driver: bridge